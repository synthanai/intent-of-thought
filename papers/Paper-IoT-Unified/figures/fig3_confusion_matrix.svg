<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow3" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="460" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Figure 3: Task-Topology Confusion Matrix</text>
  <text x="350" y="50" text-anchor="middle" font-size="10" fill="#64748b">Mean quality scores (0-3) under IoT L2 governance, n=131</text>

  <!-- Axis labels -->
  <text x="55" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#334155" transform="rotate(-90, 55, 210)">Task Category</text>
  <text x="380" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Applied Topology</text>

  <!-- Column headers -->
  <text x="250" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">CoT</text>
  <text x="390" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">GoT</text>
  <text x="530" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">ToT</text>

  <!-- Row labels -->
  <text x="130" y="175" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">Sequential</text>
  <text x="130" y="195" text-anchor="middle" font-size="9" fill="#94a3b8">(optimal: CoT)</text>

  <text x="130" y="250" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">Parallel</text>
  <text x="130" y="270" text-anchor="middle" font-size="9" fill="#94a3b8">(optimal: ToT)</text>

  <text x="130" y="330" text-anchor="middle" font-size="12" font-weight="500" fill="#334155">Interconnected</text>
  <text x="130" y="350" text-anchor="middle" font-size="9" fill="#94a3b8">(optimal: GoT)</text>

  <!-- Heatmap cells -->
  <!-- Color scale: 1.00 = deep red (#dc2626), 2.00 = amber (#f59e0b), 2.47 = green (#16a34a) -->

  <!-- Row 1: Sequential -->
  <!-- CoT: 2.13 (green-ish, best) -->
  <g filter="url(#shadow3)">
    <rect x="190" y="140" width="120" height="70" rx="8" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="250" y="178" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">2.13</text>
    <rect x="220" y="140" width="60" height="18" rx="4" fill="#16a34a"/>
    <text x="250" y="153" text-anchor="middle" font-size="8" font-weight="600" fill="white">BEST ✓</text>
  </g>
  <!-- GoT: 1.71 (amber) -->
  <g filter="url(#shadow3)">
    <rect x="330" y="140" width="120" height="70" rx="8" fill="#fde68a" stroke="#fcd34d" stroke-width="1"/>
    <text x="390" y="183" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">1.71</text>
  </g>
  <!-- ToT: 1.64 (orange) -->
  <g filter="url(#shadow3)">
    <rect x="470" y="140" width="120" height="70" rx="8" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
    <text x="530" y="183" text-anchor="middle" font-size="24" font-weight="700" fill="#9a3412">1.64</text>
  </g>

  <!-- Row 2: Parallel -->
  <!-- CoT: 2.07 (green, best) -->
  <g filter="url(#shadow3)">
    <rect x="190" y="220" width="120" height="70" rx="8" fill="#bbf7d0" stroke="#86efac" stroke-width="1"/>
    <text x="250" y="258" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">2.07</text>
    <rect x="220" y="220" width="60" height="18" rx="4" fill="#16a34a"/>
    <text x="250" y="233" text-anchor="middle" font-size="8" font-weight="600" fill="white">BEST ✓</text>
  </g>
  <!-- GoT: 1.27 (red) -->
  <g filter="url(#shadow3)">
    <rect x="330" y="220" width="120" height="70" rx="8" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
    <text x="390" y="263" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">1.27</text>
  </g>
  <!-- ToT: 2.00 (light green) -->
  <g filter="url(#shadow3)">
    <rect x="470" y="220" width="120" height="70" rx="8" fill="#d9f99d" stroke="#bef264" stroke-width="1"/>
    <text x="530" y="263" text-anchor="middle" font-size="24" font-weight="700" fill="#3f6212">2.00</text>
  </g>

  <!-- Row 3: Interconnected -->
  <!-- CoT: 2.47 (deep green, best) -->
  <g filter="url(#shadow3)">
    <rect x="190" y="300" width="120" height="70" rx="8" fill="#86efac" stroke="#4ade80" stroke-width="1"/>
    <text x="250" y="338" text-anchor="middle" font-size="24" font-weight="700" fill="#14532d">2.47</text>
    <rect x="220" y="300" width="60" height="18" rx="4" fill="#16a34a"/>
    <text x="250" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="white">BEST ✓</text>
  </g>
  <!-- GoT: 2.20 (light green) -->
  <g filter="url(#shadow3)">
    <rect x="330" y="300" width="120" height="70" rx="8" fill="#d9f99d" stroke="#bef264" stroke-width="1"/>
    <text x="390" y="343" text-anchor="middle" font-size="24" font-weight="700" fill="#3f6212">2.20</text>
  </g>
  <!-- ToT: 1.00 (DEEP RED, catastrophic) -->
  <g filter="url(#shadow3)">
    <rect x="470" y="300" width="120" height="70" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="530" y="338" text-anchor="middle" font-size="24" font-weight="700" fill="white">1.00</text>
    <rect x="500" y="300" width="60" height="18" rx="4" fill="#7f1d1d"/>
    <text x="530" y="313" text-anchor="middle" font-size="8" font-weight="600" fill="white">CATASTROPHIC</text>
  </g>

  <!-- Key insights -->
  <g transform="translate(100, 395)">
    <rect width="500" height="55" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="250" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Key Findings</text>
    <text x="250" y="34" text-anchor="middle" font-size="9" fill="#1e3a5f">CoT wins every category (Finding 4: "Unreasonable Robustness")</text>
    <text x="250" y="48" text-anchor="middle" font-size="9" fill="#1e3a5f">ToT on Interconnected = 1.00 (Finding 5: "Misselection is Catastrophic")</text>
  </g>

  <!-- Color legend -->
  <g transform="translate(620, 140)">
    <text x="0" y="0" font-size="9" font-weight="600" fill="#475569">Score</text>
    <rect x="0" y="8" width="30" height="12" rx="2" fill="#86efac"/><text x="35" y="18" font-size="8" fill="#475569">2.4+</text>
    <rect x="0" y="26" width="30" height="12" rx="2" fill="#bbf7d0"/><text x="35" y="36" font-size="8" fill="#475569">2.0+</text>
    <rect x="0" y="44" width="30" height="12" rx="2" fill="#d9f99d"/><text x="35" y="54" font-size="8" fill="#475569">1.7+</text>
    <rect x="0" y="62" width="30" height="12" rx="2" fill="#fde68a"/><text x="35" y="72" font-size="8" fill="#475569">1.5+</text>
    <rect x="0" y="80" width="30" height="12" rx="2" fill="#fecaca"/><text x="35" y="90" font-size="8" fill="#475569">1.3+</text>
    <rect x="0" y="98" width="30" height="12" rx="2" fill="#ef4444"/><text x="35" y="108" font-size="8" fill="#475569">1.0</text>
  </g>
</svg>
