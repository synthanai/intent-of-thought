<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <linearGradient id="captureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="selectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="judgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="learnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Figure 1: The IoT Lifecycle</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#64748b">Closed-loop governance from intent capture through learning</text>

  <!-- Central cycle nodes (pentagon layout) -->
  <!-- Capture (top) -->
  <g filter="url(#shadow)">
    <rect x="320" y="80" width="160" height="60" rx="12" fill="url(#captureGrad)"/>
    <text x="400" y="107" text-anchor="middle" font-size="14" font-weight="600" fill="white">CAPTURE</text>
    <text x="400" y="125" text-anchor="middle" font-size="10" fill="#dbeafe">IoT Triple (P, P̄, S)</text>
  </g>

  <!-- Select (top-right) -->
  <g filter="url(#shadow)">
    <rect x="570" y="180" width="160" height="60" rx="12" fill="url(#selectGrad)"/>
    <text x="650" y="207" text-anchor="middle" font-size="14" font-weight="600" fill="white">SELECT</text>
    <text x="650" y="225" text-anchor="middle" font-size="10" fill="#ede9fe">f(IoT, ctx) → T*</text>
  </g>

  <!-- Monitor (bottom-right) -->
  <g filter="url(#shadow)">
    <rect x="530" y="330" width="160" height="60" rx="12" fill="url(#monitorGrad)"/>
    <text x="610" y="357" text-anchor="middle" font-size="14" font-weight="600" fill="white">MONITOR</text>
    <text x="610" y="375" text-anchor="middle" font-size="10" fill="#cffafe">δ(trace, P) → [0,1]</text>
  </g>

  <!-- Judge (bottom-left) -->
  <g filter="url(#shadow)">
    <rect x="110" y="330" width="160" height="60" rx="12" fill="url(#judgeGrad)"/>
    <text x="190" y="357" text-anchor="middle" font-size="14" font-weight="600" fill="white">JUDGE</text>
    <text x="190" y="375" text-anchor="middle" font-size="10" fill="#fef3c7">Retrospective Judgement</text>
  </g>

  <!-- Learn (top-left) -->
  <g filter="url(#shadow)">
    <rect x="70" y="180" width="160" height="60" rx="12" fill="url(#learnGrad)"/>
    <text x="150" y="207" text-anchor="middle" font-size="14" font-weight="600" fill="white">LEARN</text>
    <text x="150" y="225" text-anchor="middle" font-size="10" fill="#d1fae5">Update policies, f, θ</text>
  </g>

  <!-- Arrows connecting nodes -->
  <!-- Capture → Select -->
  <line x1="480" y1="115" x2="570" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Select → Monitor -->
  <line x1="680" y1="240" x2="660" y2="330" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Monitor → Judge -->
  <line x1="530" y1="365" x2="270" y2="365" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Judge → Learn -->
  <line x1="155" y1="330" x2="150" y2="240" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Learn → Capture -->
  <line x1="230" y1="200" x2="320" y2="120" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Failure mode annotations -->
  <!-- False Capture -->
  <g transform="translate(90, 280)">
    <rect width="110" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="55" y="18" text-anchor="middle" font-size="9" font-weight="500" fill="#dc2626">False Capture</text>
  </g>
  <line x1="145" y1="308" x2="170" y2="330" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- False Selection -->
  <g transform="translate(345, 420)">
    <rect width="110" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="55" y="18" text-anchor="middle" font-size="9" font-weight="500" fill="#dc2626">False Selection</text>
  </g>
  <line x1="400" y1="420" x2="350" y2="390" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- False Execution -->
  <g transform="translate(530, 420)">
    <rect width="110" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="55" y="18" text-anchor="middle" font-size="9" font-weight="500" fill="#dc2626">False Execution</text>
  </g>
  <line x1="585" y1="420" x2="600" y2="390" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Capture Spectrum annotation -->
  <g transform="translate(320, 150)">
    <rect width="160" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="80" y="15" text-anchor="middle" font-size="9" fill="#2563eb">L0 Zero → L4 Learned</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 465)">
    <text x="0" y="12" font-size="9" fill="#64748b">Forward governance (Sections 3-4)</text>
    <line x1="190" y1="7" x2="230" y2="7" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="260" y="12" font-size="9" fill="#64748b">Backward diagnosis (Section 4.3)</text>
    <line x1="440" y1="7" x2="480" y2="7" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
</svg>
