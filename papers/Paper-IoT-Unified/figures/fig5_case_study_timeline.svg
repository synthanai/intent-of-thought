<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow5" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Figure 5: Case Study: Organic IoT Lifecycle Emergence</text>
  <text x="400" y="48" text-anchor="middle" font-size="10" fill="#64748b">Multi-agent debate protocol evolution across 75 debates (12 months)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="220" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="745" y="225" font-size="9" fill="#475569">Time</text>

  <!-- Phase dots on timeline -->
  <circle cx="130" cy="220" r="6" fill="#94a3b8"/>
  <circle cx="260" cy="220" r="6" fill="#60a5fa"/>
  <circle cx="390" cy="220" r="6" fill="#2563eb"/>
  <circle cx="520" cy="220" r="6" fill="#8b5cf6"/>
  <circle cx="650" cy="220" r="6" fill="#16a34a"/>

  <!-- Phase 1 -->
  <g filter="url(#shadow5)">
    <rect x="70" y="80" width="120" height="120" rx="8" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="70" y="80" width="120" height="28" rx="8" fill="#94a3b8"/>
    <rect x="70" y="100" width="120" height="8" fill="#94a3b8"/>
    <text x="130" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="white">Phase 1</text>
    <text x="130" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">Role-based</text>
    <text x="130" y="138" text-anchor="middle" font-size="8" fill="#64748b">Debates 1-15</text>
    <text x="130" y="158" text-anchor="middle" font-size="8" fill="#94a3b8">IoT: None</text>
    <rect x="80" y="168" width="100" height="18" rx="3" fill="#fef2f2"/>
    <text x="130" y="181" text-anchor="middle" font-size="7" fill="#dc2626">⚠ Drift, no governance</text>
  </g>
  <line x1="130" y1="200" x2="130" y2="214" stroke="#94a3b8" stroke-width="1"/>

  <!-- Phase 2 -->
  <g filter="url(#shadow5)">
    <rect x="200" y="80" width="120" height="120" rx="8" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="200" y="80" width="120" height="28" rx="8" fill="#60a5fa"/>
    <rect x="200" y="100" width="120" height="8" fill="#60a5fa"/>
    <text x="260" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="white">Phase 2</text>
    <text x="260" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">Purpose-driven</text>
    <text x="260" y="138" text-anchor="middle" font-size="8" fill="#64748b">Debates 16-30</text>
    <text x="260" y="158" text-anchor="middle" font-size="8" fill="#3b82f6">IoT: P only</text>
    <rect x="210" y="168" width="100" height="18" rx="3" fill="#fef2f2"/>
    <text x="260" y="181" text-anchor="middle" font-size="7" fill="#dc2626">⚠ Superficial consensus</text>
  </g>
  <line x1="260" y1="200" x2="260" y2="214" stroke="#60a5fa" stroke-width="1"/>

  <!-- Phase 3 (key inflection) -->
  <g filter="url(#shadow5)">
    <rect x="330" y="72" width="120" height="132" rx="8" fill="white" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="330" y="72" width="120" height="28" rx="8" fill="#2563eb"/>
    <rect x="330" y="92" width="120" height="8" fill="#2563eb"/>
    <text x="390" y="91" text-anchor="middle" font-size="11" font-weight="700" fill="white">Phase 3</text>
    <text x="390" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">Full Triple</text>
    <text x="390" y="131" text-anchor="middle" font-size="8" fill="#64748b">Debates 31-50</text>
    <text x="390" y="151" text-anchor="middle" font-size="8" fill="#2563eb">IoT: P, P̄, S</text>
    <rect x="340" y="161" width="100" height="18" rx="3" fill="#dcfce7"/>
    <text x="390" y="174" text-anchor="middle" font-size="7" fill="#16a34a">✓ Major quality jump</text>
    <rect x="340" y="183" width="100" height="14" rx="3" fill="#dbeafe"/>
    <text x="390" y="193" text-anchor="middle" font-size="7" font-weight="600" fill="#1e40af">= L2 CAPTURE</text>
  </g>
  <line x1="390" y1="204" x2="390" y2="214" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Phase 4 -->
  <g filter="url(#shadow5)">
    <rect x="460" y="80" width="120" height="120" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="460" y="80" width="120" height="28" rx="8" fill="#8b5cf6"/>
    <rect x="460" y="100" width="120" height="8" fill="#8b5cf6"/>
    <text x="520" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="white">Phase 4</text>
    <text x="520" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">Topology-aware</text>
    <text x="520" y="138" text-anchor="middle" font-size="8" fill="#64748b">Debates 51-65</text>
    <text x="520" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">IoT: Triple + f()</text>
    <rect x="470" y="168" width="100" height="18" rx="3" fill="#dcfce7"/>
    <text x="520" y="181" text-anchor="middle" font-size="7" fill="#16a34a">✓ Selection fn active</text>
  </g>
  <line x1="520" y1="200" x2="520" y2="214" stroke="#8b5cf6" stroke-width="1"/>

  <!-- Phase 5 -->
  <g filter="url(#shadow5)">
    <rect x="590" y="80" width="120" height="120" rx="8" fill="white" stroke="#16a34a" stroke-width="1.5"/>
    <rect x="590" y="80" width="120" height="28" rx="8" fill="#16a34a"/>
    <rect x="590" y="100" width="120" height="8" fill="#16a34a"/>
    <text x="650" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="white">Phase 5</text>
    <text x="650" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">Full Lifecycle</text>
    <text x="650" y="138" text-anchor="middle" font-size="8" fill="#64748b">Debates 66-75</text>
    <text x="650" y="158" text-anchor="middle" font-size="8" fill="#059669">IoT: Complete loop</text>
    <rect x="600" y="168" width="100" height="18" rx="3" fill="#dcfce7"/>
    <text x="650" y="181" text-anchor="middle" font-size="7" fill="#16a34a">✓ Learning closes loop</text>
  </g>
  <line x1="650" y1="200" x2="650" y2="214" stroke="#16a34a" stroke-width="1"/>

  <!-- IoT component accumulation below timeline -->
  <g transform="translate(0, 240)">
    <!-- Accumulation labels -->
    <rect x="70" y="10" width="120" height="20" rx="4" fill="#f1f5f9"/>
    <text x="130" y="24" text-anchor="middle" font-size="8" fill="#94a3b8">No components</text>

    <rect x="200" y="10" width="120" height="20" rx="4" fill="#eff6ff"/>
    <text x="260" y="24" text-anchor="middle" font-size="8" fill="#3b82f6">P</text>

    <rect x="330" y="10" width="120" height="20" rx="4" fill="#dbeafe"/>
    <text x="390" y="24" text-anchor="middle" font-size="8" fill="#2563eb">P + P̄ + S</text>

    <rect x="460" y="10" width="120" height="20" rx="4" fill="#c4b5fd"/>
    <text x="520" y="24" text-anchor="middle" font-size="8" fill="#6d28d9">P + P̄ + S + f()</text>

    <rect x="590" y="10" width="120" height="20" rx="4" fill="#bbf7d0"/>
    <text x="650" y="24" text-anchor="middle" font-size="8" fill="#166534">P + P̄ + S + f() + J + L</text>
  </g>

  <!-- IoT Lifecycle labels below accumulation -->
  <g transform="translate(0, 280)">
    <text x="130" y="15" text-anchor="middle" font-size="7" fill="#94a3b8">L0</text>
    <text x="260" y="15" text-anchor="middle" font-size="7" fill="#3b82f6">Partial L2</text>
    <text x="390" y="15" text-anchor="middle" font-size="7" font-weight="600" fill="#2563eb">L2</text>
    <text x="520" y="15" text-anchor="middle" font-size="7" fill="#6d28d9">L2 + Selection</text>
    <text x="650" y="15" text-anchor="middle" font-size="7" fill="#166534">L2 + Lifecycle</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(140, 310)">
    <rect width="520" height="35" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="260" y="15" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Key Insight</text>
    <text x="260" y="29" text-anchor="middle" font-size="8" fill="#1e3a5f">Each governance component was added in response to an observed failure mode, not top-down design</text>
  </g>

  <!-- Phase 3 callout arrow -->
  <path d="M390,65 L390,55 L400,55" stroke="#2563eb" stroke-width="1.5" fill="none"/>
  <text x="405" y="59" font-size="8" font-weight="600" fill="#2563eb">Critical inflection point</text>
</svg>
