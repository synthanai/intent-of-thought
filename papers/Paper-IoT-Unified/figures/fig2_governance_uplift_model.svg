<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="barBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barIoT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Figure 2: Governance Uplift by Model</text>
  <text x="400" y="50" text-anchor="middle" font-size="10" fill="#64748b">Baseline (no IoT) vs IoT L2 governance, scored 0-3. Sorted by uplift %.</text>

  <!-- Y-axis -->
  <line x1="100" y1="70" x2="100" y2="380" stroke="#cbd5e1" stroke-width="1"/>
  <text x="45" y="230" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90, 45, 230)">Mean Score (0-3)</text>

  <!-- Y-axis ticks -->
  <line x1="95" y1="380" x2="100" y2="380" stroke="#94a3b8" stroke-width="1"/>
  <text x="88" y="384" text-anchor="end" font-size="10" fill="#64748b">0.0</text>
  <line x1="95" y1="277" x2="760" y2="277" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="88" y="281" text-anchor="end" font-size="10" fill="#64748b">1.0</text>
  <line x1="95" y1="173" x2="760" y2="173" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="88" y="177" text-anchor="end" font-size="10" fill="#64748b">2.0</text>
  <line x1="95" y1="70" x2="760" y2="70" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="88" y="74" text-anchor="end" font-size="10" fill="#64748b">3.0</text>

  <!-- X-axis -->
  <line x1="100" y1="380" x2="760" y2="380" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Bar groups: 7 models, each pair of bars -->
  <!-- Scale: 0 = y380, 3.0 = y70. So value V maps to y = 380 - (V/3.0)*310 -->

  <!-- Model 1: qwen2.5:7b (B=2.08, I=2.77, +33.3%) -->
  <g filter="url(#shadow2)">
    <rect x="120" y="164.9" width="32" height="215.1" rx="3" fill="url(#barBase)"/>
    <rect x="156" y="93.5" width="32" height="286.5" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="154" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+33.3%</text>
  <text x="154" y="400" text-anchor="middle" font-size="9" fill="#334155">qwen2.5</text>
  <text x="154" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">7B</text>

  <!-- Model 2: mistral (B=1.62, I=2.10, +30.2%) -->
  <g filter="url(#shadow2)">
    <rect x="210" y="212.5" width="32" height="167.5" rx="3" fill="url(#barBase)"/>
    <rect x="246" y="162.9" width="32" height="217.1" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="244" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+30.2%</text>
  <text x="244" y="400" text-anchor="middle" font-size="9" fill="#334155">mistral</text>
  <text x="244" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">7B</text>

  <!-- Model 3: gemma3:12b (B=2.13, I=2.61, +22.2%) -->
  <g filter="url(#shadow2)">
    <rect x="300" y="159.7" width="32" height="220.3" rx="3" fill="url(#barBase)"/>
    <rect x="336" y="110.1" width="32" height="269.9" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="334" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+22.2%</text>
  <text x="334" y="400" text-anchor="middle" font-size="9" fill="#334155">gemma3</text>
  <text x="334" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">12B</text>

  <!-- Model 4: nemotron-120b (B=2.27, I=2.64, +16.3%) -->
  <g filter="url(#shadow2)">
    <rect x="390" y="145.2" width="32" height="234.8" rx="3" fill="url(#barBase)"/>
    <rect x="426" y="107" width="32" height="273" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="424" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+16.3%</text>
  <text x="424" y="400" text-anchor="middle" font-size="9" fill="#334155">nemotron</text>
  <text x="424" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">120B</text>

  <!-- Model 5: phi4:14b (B=2.34, I=2.71, +15.7%) -->
  <g filter="url(#shadow2)">
    <rect x="480" y="137.9" width="32" height="242.1" rx="3" fill="url(#barBase)"/>
    <rect x="516" y="99.8" width="32" height="280.2" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="514" y="128" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+15.7%</text>
  <text x="514" y="400" text-anchor="middle" font-size="9" fill="#334155">phi4</text>
  <text x="514" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">14B</text>

  <!-- Model 6: deepseek-r1:7b (B=2.09, I=2.34, +12.0%) -->
  <g filter="url(#shadow2)">
    <rect x="570" y="163.9" width="32" height="216.1" rx="3" fill="url(#barBase)"/>
    <rect x="606" y="138.1" width="32" height="241.9" rx="3" fill="url(#barIoT)"/>
  </g>
  <text x="604" y="154" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">+12.0%</text>
  <text x="604" y="400" text-anchor="middle" font-size="9" fill="#334155">deepseek</text>
  <text x="604" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">7B</text>

  <!-- Model 7: glm-5-turbo (B=2.31, I=2.12, -8.3%) -->
  <g filter="url(#shadow2)">
    <rect x="660" y="141.0" width="32" height="239.0" rx="3" fill="url(#barBase)"/>
    <rect x="696" y="160.8" width="32" height="219.2" rx="3" fill="url(#barIoT)" opacity="0.5"/>
  </g>
  <text x="694" y="131" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">-8.3%</text>
  <text x="694" y="400" text-anchor="middle" font-size="9" fill="#334155">glm-5</text>
  <text x="694" y="412" text-anchor="middle" font-size="8" fill="#94a3b8">~14B</text>

  <!-- Trendline annotation -->
  <line x1="136" y1="160" x2="622" y2="144" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="400" y="140" text-anchor="middle" font-size="9" font-weight="500" fill="#16a34a" opacity="0.8">Uplift inversely correlated with model size</text>

  <!-- Legend -->
  <g transform="translate(250, 435)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="url(#barBase)"/>
    <text x="20" y="12" font-size="10" fill="#475569">Baseline (no IoT)</text>
    <rect x="140" y="0" width="14" height="14" rx="2" fill="url(#barIoT)"/>
    <text x="160" y="12" font-size="10" fill="#475569">IoT L2 Governance</text>
  </g>

  <!-- Overall stats -->
  <g transform="translate(110, 455)">
    <text x="0" y="12" font-size="9" fill="#64748b">Overall: 2.10 → 2.43 (+15.7%, n=486) | 6/7 models positive | Cognitive equaliser effect confirmed</text>
  </g>
</svg>
