<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Figure 1: The IoT Lifecycle</text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">Closed-Loop Intent Governance for Reasoning Topology Selection</text>

  <!-- Central circle -->
  <circle cx="450" cy="270" r="60" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="450" y="265" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">LEARNING</text>
  <text x="450" y="280" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">LOOP</text>

  <!-- Phase nodes (hexagonal arrangement) -->
  <!-- 1. CAPTURE (top) -->
  <rect x="400" y="90" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">1. CAPTURE</text>
  <text x="450" y="122" text-anchor="middle" fill="#64748b" font-size="9">L0-L4 Spectrum</text>

  <!-- 2. SELECT (top-right) -->
  <rect x="610" y="155" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#22d3ee" stroke-width="2"/>
  <text x="660" y="173" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">2. SELECT</text>
  <text x="660" y="187" text-anchor="middle" fill="#64748b" font-size="9">f(IoT, ctx, φ)→T*</text>

  <!-- 3. MONITOR (bottom-right) -->
  <rect x="610" y="325" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#a78bfa" stroke-width="2"/>
  <text x="660" y="343" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">3. MONITOR</text>
  <text x="660" y="357" text-anchor="middle" fill="#64748b" font-size="9">δ(trace, P)→[0,1]</text>

  <!-- 4. JUDGE (bottom) -->
  <rect x="400" y="400" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="418" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">4. JUDGE</text>
  <text x="450" y="432" text-anchor="middle" fill="#64748b" font-size="9">3 Failure Modes</text>

  <!-- 5. RESPOND (bottom-left) -->
  <rect x="190" y="325" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="343" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">5. RESPOND</text>
  <text x="240" y="357" text-anchor="middle" fill="#64748b" font-size="9">5 Gov. Levels</text>

  <!-- 6. LEARN (top-left) -->
  <rect x="190" y="155" width="100" height="44" rx="8" fill="#1e3a5f" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="173" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">6. LEARN</text>
  <text x="240" y="187" text-anchor="middle" fill="#64748b" font-size="9">Update f, δ, φ</text>

  <!-- Arrows (clockwise) -->
  <!-- Capture → Select -->
  <path d="M500,112 Q560,112 610,165" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <!-- Select → Monitor -->
  <path d="M660,199 L660,325" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <!-- Monitor → Judge -->
  <path d="M610,347 Q560,400 500,422" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <!-- Judge → Respond -->
  <path d="M400,422 Q340,400 290,369" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-red)"/>
  <!-- Respond → Learn -->
  <path d="M240,325 L240,199" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Learn → Capture -->
  <path d="M290,165 Q340,112 400,112" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Failure mode labels (inside the circle area) -->
  <text x="450" y="220" text-anchor="middle" fill="#475569" font-size="9">False Capture</text>
  <text x="450" y="232" text-anchor="middle" fill="#475569" font-size="9">False Selection</text>
  <text x="450" y="244" text-anchor="middle" fill="#475569" font-size="9">False Execution</text>

  <!-- Paper reference -->
  <text x="450" y="480" text-anchor="middle" fill="#475569" font-size="10">Mohamed Kani (2026). The IoT Lifecycle.</text>
</svg>
