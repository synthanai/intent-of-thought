<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="380" fill="url(#bg3)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Figure 3: Retrospective Judgement</text>
  <text x="450" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">Backward Intent Reconstruction and Three Failure Modes</text>

  <!-- Input box -->
  <rect x="40" y="80" width="160" height="80" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="120" y="103" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">INPUTS</text>
  <text x="120" y="120" text-anchor="middle" fill="#94a3b8" font-size="9">Failed trace T_result</text>
  <text x="120" y="133" text-anchor="middle" fill="#94a3b8" font-size="9">Original IoT (P, P̄, S)</text>
  <text x="120" y="146" text-anchor="middle" fill="#94a3b8" font-size="9">Selected topology T*</text>

  <!-- Arrow to reconstruction -->
  <path d="M200,120 L260,120" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#64748b"/></marker></defs>

  <!-- Reconstruction box -->
  <rect x="270" y="80" width="180" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="100" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">RECONSTRUCT</text>
  <text x="360" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">1. Extract outcome O</text>
  <text x="360" y="131" text-anchor="middle" fill="#94a3b8" font-size="9">2. Compare O vs S, O vs P̄</text>
  <text x="360" y="144" text-anchor="middle" fill="#94a3b8" font-size="9">3. Reconstruct P_actual</text>

  <!-- Arrow to diagnosis -->
  <path d="M450,120 L510,120" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr2)"/>
  <defs><marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#3b82f6"/></marker></defs>

  <!-- Diagnosis diamond -->
  <rect x="520" y="80" width="160" height="80" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">DIAGNOSE</text>
  <text x="600" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">4. P_actual ≠ P_captured?</text>
  <text x="600" y="131" text-anchor="middle" fill="#94a3b8" font-size="9">5. T_optimal ≠ T_selected?</text>
  <text x="600" y="144" text-anchor="middle" fill="#94a3b8" font-size="9">6. δ > θ?</text>

  <!-- Three failure mode boxes -->
  <!-- False Capture -->
  <rect x="80" y="210" width="220" height="90" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="190" y="233" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FALSE CAPTURE</text>
  <text x="190" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">P_captured ≠ P_actual</text>
  <text x="190" y="268" text-anchor="middle" fill="#64748b" font-size="9">Intent was incorrectly specified</text>
  <text x="190" y="288" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">→ Elevate capture mode</text>

  <!-- False Selection -->
  <rect x="340" y="210" width="220" height="90" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="233" text-anchor="middle" fill="#fde047" font-size="13" font-weight="700">FALSE SELECTION</text>
  <text x="450" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">T_selected ≠ T_optimal</text>
  <text x="450" y="268" text-anchor="middle" fill="#64748b" font-size="9">Wrong topology for correct intent</text>
  <text x="450" y="288" text-anchor="middle" fill="#eab308" font-size="9" font-weight="600">→ Update selection function f</text>

  <!-- False Execution -->
  <rect x="600" y="210" width="220" height="90" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="710" y="233" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">FALSE EXECUTION</text>
  <text x="710" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">δ > θ despite correct P, T</text>
  <text x="710" y="268" text-anchor="middle" fill="#64748b" font-size="9">Reasoning drifted mid-execution</text>
  <text x="710" y="288" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">→ Calibrate drift threshold δ</text>

  <!-- Arrows from diagnosis to failure modes -->
  <path d="M560,160 L190,210" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M600,160 L450,210" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M640,160 L710,210" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Governance response at bottom -->
  <rect x="80" y="325" width="740" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="344" fill="#ef4444" font-size="9" font-weight="600">L1 Silent</text>
  <text x="260" y="344" fill="#f97316" font-size="9" font-weight="600">L2 Notify</text>
  <text x="400" y="344" fill="#eab308" font-size="9" font-weight="600">L3 Halt</text>
  <text x="540" y="344" fill="#a78bfa" font-size="9" font-weight="600">L4 Escalate</text>
  <text x="700" y="344" fill="#ef4444" font-size="9" font-weight="700">L5 Abort</text>
  <text x="450" y="370" text-anchor="middle" fill="#475569" font-size="9">Governance-Proportional Response (scales with intent criticality)</text>
</svg>
