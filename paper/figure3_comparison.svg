<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="900" height="360" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Figure 3: Without IoT vs. With IoT</text>

  <!-- =============== LEFT SIDE: Without IoT =============== -->
  <rect x="20" y="48" width="400" height="290" rx="10" fill="#FFF8E1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="220" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Without IoT</text>

  <!-- Task -->
  <rect x="140" y="90" width="160" height="36" rx="6" fill="white" stroke="#999" stroke-width="1"/>
  <text x="220" y="113" text-anchor="middle" font-size="12" fill="#333">"Solve this problem"</text>

  <!-- Arrow -->
  <line x1="220" y1="126" x2="220" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Question mark -->
  <text x="220" y="178" text-anchor="middle" font-size="28" fill="#F44336">?</text>
  <text x="220" y="198" text-anchor="middle" font-size="11" fill="#F44336" font-weight="bold">Which topology?</text>

  <!-- Arrow -->
  <line x1="220" y1="206" x2="220" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Default CoT -->
  <rect x="120" y="228" width="200" height="36" rx="6" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="220" y="251" text-anchor="middle" font-size="12" fill="#C62828">Always defaults to CoT</text>

  <!-- Problems -->
  <text x="220" y="286" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Intuition / heuristics / hardcoded</text>
  <text x="220" y="302" text-anchor="middle" font-size="10" fill="#999" font-style="italic">No purpose analysis</text>
  <text x="220" y="318" text-anchor="middle" font-size="10" fill="#999" font-style="italic">No drift detection</text>

  <!-- =============== RIGHT SIDE: With IoT =============== -->
  <rect x="480" y="48" width="400" height="290" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="680" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">With IoT</text>

  <!-- Task -->
  <rect x="600" y="90" width="160" height="36" rx="6" fill="white" stroke="#999" stroke-width="1"/>
  <text x="680" y="113" text-anchor="middle" font-size="12" fill="#333">"Solve this problem"</text>

  <!-- Arrow -->
  <line x1="680" y1="126" x2="680" y2="146" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IoT Checkpoint (compact) -->
  <rect x="580" y="150" width="200" height="60" rx="6" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <text x="680" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#00695C">IoT: P, P̄, S</text>
  <text x="680" y="182" text-anchor="middle" font-size="9" fill="#555">WHY? AVOID? DONE?</text>
  <text x="680" y="196" text-anchor="middle" font-size="9" fill="#555">Purpose-governed selection</text>

  <!-- Arrow -->
  <line x1="680" y1="210" x2="680" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Right topology -->
  <rect x="580" y="228" width="200" height="36" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="680" y="251" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="bold">Right topology for THIS task</text>

  <!-- Benefits -->
  <text x="680" y="286" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">✓ Purpose-driven selection</text>
  <text x="680" y="302" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">✓ Anti-purpose guardrails</text>
  <text x="680" y="318" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">✓ Continuous drift detection</text>

  <!-- VS divider -->
  <circle cx="450" cy="193" r="20" fill="#333"/>
  <text x="450" y="199" text-anchor="middle" font-size="13" font-weight="bold" fill="white">vs</text>
</svg>
